<!DOCTYPE html>
<html lang="en">
<head>
  <title>uwu</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@pinguinosod/loading-bear@2/dist/loading-bear.min.js"></script>
</head>
<body>
<div class="uwu" onclick="showLoader()"></div>
<script>
function showLoader() {
  loadingBear({
    'duration': 3000,
    'height': '40px',
    'lBearContainerClass': 'lb-container',
    'lBearClass': 'lb-wrapper',
    'lBearInnerClass': 'lb-inner'
  });
  var elm = document.getElementsByClassName('uwu')[0];
  var newone = elm.cloneNode(true);
  elm.parentNode.replaceChild(newone, elm);
}
showLoader();
</script>
</body>
</html>
